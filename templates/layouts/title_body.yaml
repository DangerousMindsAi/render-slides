layout: title_body
editable_paths:
- path: slides[*].slots.title
  operation: set_text
  description: Replaces text content for the selected slot.
  params:
  - text
  bounds: text length must be <= 2000 characters
- path: slides[*].slots.body
  operation: set_text
  description: Replaces text content for the selected slot.
  params:
  - text
  bounds: text length must be <= 2000 characters
elements:
  title:
    x: 7.0%
    y: 9.4%
    width: 86.0%
    height: 15.6%
    font_size: 40
    bold: true
  body:
    x: 7.0%
    y: 28.6%
    width: 86.0%
    height: 56.0%
    font_size: 24
    bold: false
