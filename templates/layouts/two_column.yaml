layout: two_column
description: "A slide with a title and two side-by-side content columns."
parameters:
  split: 0.5
editable_paths:
- path: slides[*].slots.title
  operation: set_text
  description: Replaces text content for the selected slot.
  params:
  - text
  bounds: text length must be <= 2000 characters
- path: slides[*].slots.left
  operation: set_text
  description: Replaces text content for the selected slot.
  params:
  - text
  bounds: text length must be <= 2000 characters
- path: slides[*].slots.right
  operation: set_text
  description: Replaces text content for the selected slot.
  params:
  - text
  bounds: text length must be <= 2000 characters
elements:
  title:
    x: 7.0%
    y: 6.3%
    width: 86.0%
    height: 14.3%
    font_size: 36
    bold: true
  left:
    x: 7.0%
    y: 24.7%
    width: "($split * 86.0%) - 2.0%"
    height: 67.7%
    font_size: 22
    bold: false
  right:
    x: "($split * 86.0%) + 9.0%"
    y: 24.7%
    width: "((1 - $split) * 86.0%) - 2.0%"
    height: 67.7%
    font_size: 22
    bold: false
