name: parity-harness

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  parity-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build and install wheel
        run: |
          python -m maturin build --release -o dist
          python -m pip install --force-reinstall dist/render_slides-*.whl

      - name: Run parity harness
        run: |
          mkdir -p artifacts/parity
          python scripts/parity_harness.py \
            --checks html,png,pptx \
            --png-rmse-threshold 0.0 \
            --png-diff-ratio-threshold 0.0 \
            --artifacts-dir artifacts/parity

      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-harness-artifacts
          path: artifacts/parity
          if-no-files-found: warn
